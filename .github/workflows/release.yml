name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:skill
      - name: Package Claude.ai skill zip
        run: |
          cd skills
          zip -r ../clarity-skill.zip clarity
      - uses: actions/upload-artifact@v4
        with:
          name: clarity-skill
          path: |
            skills/clarity/SKILL.md
            skills/clarity/clarity.cjs
            clarity-skill.zip

  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: clarity-cli-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: clarity-cli-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: clarity-cli-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: clarity-cli-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [bundle-skill, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Make binaries executable
        run: chmod +x artifacts/clarity-cli-* || true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/clarity-cli-*
            artifacts/SKILL.md
            artifacts/clarity.cjs
            artifacts/clarity-skill.zip
          generate_release_notes: true
